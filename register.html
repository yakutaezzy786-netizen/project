<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | BrainOrbit</title>

    <link rel="stylesheet" href="CSS/register.css">
</head>
<body>

    <div class="register-box">

        <h1>Create Account</h1>

        <input
            type="text"
            id="name"
            placeholder="Full Name">

        <input
            type="email"
            id="email"
            placeholder="Email">

        <input
            type="password"
            id="password"
            placeholder="Password">

        <button id="registerBtn">
            Register
        </button>

        <p>
            Already have an account?

            <a href="login.html">
                Login
            </a>
        </p>

    </div>

    <!-- Success Popup -->

<div id="popup" class="popup">

    <div class="popup-box">

        <div class="popup-icon">

            ✓

        </div>

        <h2 id="popupTitle">

            Success

        </h2>

        <p id="popupMessage">

            Registration Successful!

        </p>

        <button id="popupBtn">

            Continue

        </button>

    </div>

</div>

<script src="JS/register.js"></script>

</body>
</html>
