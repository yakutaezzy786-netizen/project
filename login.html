<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | BrainOrbit</title>

    <link rel="stylesheet" href="CSS/login.css">
</head>
<body>

    <div class="login-box">

        <h1>Login</h1>

        <input
            type="email"
            id="email"
            placeholder="Email">

        <input
            type="password"
            id="password"
            placeholder="Password">

        <button id="loginBtn">
            Login
        </button>

        <p>
            Don't have an account?

            <a href="register.html">
                Register
            </a>
        </p>

    </div>

<script src="JS/login.js"></script>

</body>
</html>
